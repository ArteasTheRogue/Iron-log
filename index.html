<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Iron Log</title>

<!-- Полноэкранный режим на iPhone, без адресной строки -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#14161A">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #14161A;
    color: #ECEDE8;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  #root { min-height: 100vh; }
  /* заставка, пока грузится бандл */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #14161A; color: #8E949E;
    font: 600 15px/1.4 -apple-system, system-ui, sans-serif;
    letter-spacing: .08em; text-transform: uppercase;
  }
</style>
</head>

<body>
<div id="boot">Iron Log</div>
<div id="root"></div>

<!-- 1. Хранилище: localStorage + IndexedDB (замена storage из артефакта) -->
<script src="storage.js"></script>

<!-- 2. Само приложение -->
<script src="app.js"></script>

<script>
  // убрать заставку
  var b = document.getElementById("boot");
  if (b) b.remove();

  // 3. Офлайн-режим
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
</body>
</html>
